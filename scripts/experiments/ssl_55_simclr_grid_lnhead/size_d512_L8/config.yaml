experiment_type: 'ssl'
experiment_name: '55_simclr_grid_lnhead_d512_L8'
run_message: >
  ssl_55 — d512_L8 (~45M params), ResNet-50/2 scale. Identical to
  ssl_54 d512_L8 except: SimCLRSmrtLN with LayerNorm-augmented
  projection head, and defensive non-finite-grad skip in the training
  loop. ssl_54's d512 showed the same projection-head magnitude bump
  (z_std → 60) as d768 but recovered (z_std → 50) and held probe
  ~0.65; the LN fix here should eliminate the bump entirely and
  potentially nudge probe up by sparing the encoder the partial-damage
  recovery period. Full SSL epoch (ds_limit=0), ChunkedRandomSampler,
  step-based probe + milestone checkpoints every 10k steps,
  walltime-capped at 30h. Yoran dataset.

resources:
  cores: 64
  memory: 320gb
  walltime: "20:00:00"
  gres: gpu:8
  num_processes: 8

ssl_dataset: 'yoran_raw.memmap'

probe_pos_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
probe_neg_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
probe_pos_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
probe_neg_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

data_config: 'configs/data.yaml'

resume_from: ''

simclr:
  d_model: 512
  n_head: 8               # head_dim = 64
  n_layers: 8
  context: 32
  projection_dim: 128
  projection_layers: 2
  temperature: 0.1
  epochs: 50
  ds_limit: 0
  batch_size: 512
  optimizer: 'AdamW'
  max_lr: 3.0e-4
  weight_decay: 1.0e-4
  pct_start: 0.05
  grad_clip: 5.0
  probe_every_steps: 10000
  checkpoint_every_steps: 10000
  resume_every_steps: 10000
  chunk_size: 2048

augment:
  revcomp_p: 0.0
  channel_dropout_p: 0.2
  gaussian_noise_p: 0.8
  gaussian_noise_sigma: 0.1
  blur_p: 0.5
  blur_sigma_range: [0.2, 2.0]

probe:
  context: 32
  batch_size: 512
  epochs: 3
  lr: 3.0e-3
  ds_limit: 500000
