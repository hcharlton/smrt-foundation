experiment_type: 'ssl'
experiment_name: '55_simclr_grid_lnhead_d128_L4'
run_message: >
  ssl_55 — d128_L4 anchor (~2M params). Identical to ssl_54 d128_L4
  except: SimCLRSmrtLN with LayerNorm-augmented projection head, and
  defensive non-finite-grad skip in the training loop. Used as the
  control: d128 in ssl_54 wasn't catastrophically failing, so this run
  validates the LN head doesn't regress probe quality at the small end
  of the grid. Full SSL epoch (ds_limit=0, ~100M reads/epoch),
  ChunkedRandomSampler, step-based probe + milestone checkpoints every
  10k steps, walltime-capped at 30h. Yoran dataset. Pass criterion
  unchanged: probe_top1 >= 0.63 at end AND non-decreasing over last
  3 evals.

resources:
  cores: 64
  memory: 256gb
  walltime: "20:00:00"
  gres: gpu:8
  num_processes: 8

ssl_dataset: 'yoran_raw.memmap'

probe_pos_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
probe_neg_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
probe_pos_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
probe_neg_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

data_config: 'configs/data.yaml'

resume_from: ''

simclr:
  d_model: 128
  n_head: 2
  n_layers: 4
  context: 32
  projection_dim: 128
  projection_layers: 2
  temperature: 0.1
  epochs: 50
  ds_limit: 0
  batch_size: 512
  optimizer: 'AdamW'
  max_lr: 3.0e-4
  weight_decay: 1.0e-4
  pct_start: 0.05
  grad_clip: 5.0
  probe_every_steps: 10000
  checkpoint_every_steps: 10000
  resume_every_steps: 10000
  chunk_size: 2048

augment:
  revcomp_p: 0.0
  channel_dropout_p: 0.2
  gaussian_noise_p: 0.8
  gaussian_noise_sigma: 0.1
  blur_p: 0.5
  blur_sigma_range: [0.2, 2.0]

probe:
  context: 32
  batch_size: 512
  epochs: 3
  lr: 3.0e-3
  ds_limit: 500000
