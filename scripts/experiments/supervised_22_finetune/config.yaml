experiment_type: 'supervised'
experiment_name: '22_finetune_pretrained'
run_message: 'Fine-tune pretrained SSL encoder on labeled CpG data. Two-stage: frozen head warmup then full fine-tuning.'

resources:
  cores: 16
  memory: 256gb
  walltime: 8:00:00
  gres: gpu:8
  num_processes: 8

pretrained_checkpoint: 'scripts/experiments/ssl_21_pretrain/checkpoints/final_model.pt'

pos_data_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
neg_data_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
pos_data_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
neg_data_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

classifier:
  d_model: 128
  n_head: 4
  context: 32
  n_layers: 4
  vocab_size: 5
  weight_decay: 0.02
  ds_limit: 8000000
  batch_size: 512
  optimizer: 'AdamW'

  # Stage 1: frozen encoder, train head only
  frozen_epochs: 5
  frozen_lr: 3e-3

  # Stage 2: unfreeze encoder, fine-tune all
  finetune_epochs: 15
  encoder_lr: 3e-4
  head_lr: 3e-3
  pct_start: 0.1
