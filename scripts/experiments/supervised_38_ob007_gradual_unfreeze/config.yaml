experiment_type: 'supervised'
experiment_name: '38_ob007_gradual_unfreeze'
run_message: >-
  Data scaling with exp 29 OB007 pretrained encoder. Same two-stage setup as
  exp 35 but with gradual encoder unfreezing: encoder LR warms up from 1e-5
  to 3e-4 over 100k steps instead of jumping to 3e-4 immediately. Head LR
  unchanged. Doubled eval frequency (40 log-spaced) to better capture stage 2.

pretrained_checkpoint: 'scripts/experiments/ssl_29_large_pretrain/checkpoints/final_model.pt'

resources:
  cores: 32
  memory: 256gb
  walltime: 24:00:00
  gres: gpu:8
  num_processes: 1

pos_data_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
neg_data_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
pos_data_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
neg_data_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

scaling:
  train_sizes: [100, 500, 1000, 2000, 4000, 8000, 16000, 32000, 64000, 128000,
                256000, 512000, 1000000, 2000000, 4000000, 8000000]
  val_limit: 1000000
  steps_per_size: 400000
  n_evals: 40
  first_eval_step: 100

classifier:
  d_model: 128
  n_head: 4
  context: 32
  n_layers: 4
  weight_decay: 0.02
  batch_size: 512
  pct_start: 0.1

finetune:
  frozen_steps: 100000
  frozen_lr: 3e-3
  encoder_lr: 3e-4
  encoder_start_lr: 1e-5
  encoder_warmup_steps: 100000
  head_lr: 3e-3
