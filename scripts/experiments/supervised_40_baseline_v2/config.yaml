experiment_type: 'supervised'
experiment_name: '40_baseline_v2'
run_message: 'Clean rewrite of exp 31 with fixed LR scheduler. Removes accelerator.prepare(scheduler) which caused the schedule to not advance at the intended rate. All other parameters identical to exp 31.'

resources:
  cores: 16
  memory: 256gb
  walltime: 15:00:00
  gres: gpu:8
  num_processes: 8

pos_data_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
neg_data_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
pos_data_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
neg_data_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

classifier:
  d_model: 128
  n_head: 4
  context: 32
  n_layers: 4
  weight_decay: 0.02
  epochs: 20
  ds_limit: 0
  batch_size: 512
  max_lr: 3e-3
  pct_start: 0.1
