experiment_type: 'supervised'
experiment_name: '44_ob007_gradual_scaled_bs'
run_message: >-
  Rerun of exp 43 with batch size scaled per training-dataset size to
  restore stochastic gradient noise at small n. Batch is
  min(bs_cap, max(bs_floor, n_train // bs_k)) so tiny sets train with
  real SGD noise while large sets keep the bs=4096 throughput.
  All LRs, schedule fractions, and encoder-warmup structure match
  exp 43 so any difference is attributable to batch-size regime.

pretrained_checkpoint: 'scripts/experiments/ssl_29_large_pretrain/checkpoints/final_model.pt'

resources:
  cores: 32
  memory: 256gb
  walltime: 04:00:00
  gres: gpu:8
  num_processes: 1

pos_data_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
neg_data_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
pos_data_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
neg_data_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

scaling:
  train_sizes: [100, 500, 1000, 2000, 4000, 8000, 16000, 32000, 64000, 128000,
                256000, 512000, 1000000, 2000000, 4000000, 8000000]
  val_limit: 1000000
  max_epochs: 200
  min_steps: 10000
  max_steps: 400000
  n_evals: 40
  first_eval_step: 100

classifier:
  d_model: 128
  n_head: 4
  context: 32
  n_layers: 4
  weight_decay: 0.02
  batch_size: 4096     # bs_cap
  bs_floor: 64
  bs_k: 8
  pct_start: 0.1

finetune:
  frozen_frac: 0.25
  frozen_lr: 3e-3
  encoder_lr: 3e-4
  encoder_start_lr: 1e-5
  encoder_warmup_frac: 0.333
  head_lr: 3e-3
