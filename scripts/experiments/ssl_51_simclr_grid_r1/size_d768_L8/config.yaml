experiment_type: 'ssl'
experiment_name: '51_simclr_grid_r1_d768_L8'
run_message: >
  R1 grid — largest size that fits under the 400 H100-hour per-request
  cap at 100 epochs. 102M params measured (the plan's 54M estimate
  undercounted the fixed 11-ResBlock CNN, which dominates at high
  d_model). Tests the scaling regime that Round 2 would push further
  once the per-request cap is raised.

resources:
  cores: 64
  memory: 448gb
  walltime: 48:00:00       # ~48 h training
  gres: gpu:8
  num_processes: 8

ssl_dataset: 'ob007_raw.memmap'

probe_pos_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
probe_neg_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
probe_pos_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
probe_neg_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

data_config: 'configs/data.yaml'

# Resume target (empty = fresh run). Point at a prior run's
# `checkpoints/latest/` Accelerate state dir to resume.
resume_from: ''

simclr:
  d_model: 768
  n_head: 12              # head_dim = 64
  n_layers: 8
  context: 32
  projection_dim: 128
  projection_layers: 2
  temperature: 0.1
  epochs: 100
  ds_limit: 200000
  batch_size: 256          # halved to keep per-rank activation memory in bounds
  optimizer: 'AdamW'
  max_lr: 3.0e-4
  weight_decay: 1.0e-4
  pct_start: 0.05
  checkpoint_every: 25       # portable epoch_N.pt milestones
  resume_every: 1            # ~3.8 h/epoch × 1 = ~3.8 h max wall loss
  probe_every: 5

augment:
  revcomp_p: 0.0
  channel_dropout_p: 0.2
  gaussian_noise_p: 0.8
  gaussian_noise_sigma: 0.1
  blur_p: 0.5
  blur_sigma_range: [0.2, 2.0]

probe:
  context: 32
  batch_size: 512
  epochs: 3
  lr: 3.0e-3
  ds_limit: 500000
