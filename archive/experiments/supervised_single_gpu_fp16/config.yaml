experiment_type: 'supervised'
experiment_name: 'single_gpu_fp16'
run_message: 'single GPU with fp16 and large batch to eliminate DDP overhead on small model'

pos_data_train: 'data/01_processed/val_sets/cpg_pos.memmap/train'
neg_data_train: 'data/01_processed/val_sets/cpg_neg.memmap/train'
pos_data_val: 'data/01_processed/val_sets/cpg_pos.memmap/val'
neg_data_val: 'data/01_processed/val_sets/cpg_neg.memmap/val'

mixed_precision: 'fp16'

classifier:
  d_model: 128
  n_head: 4
  context: 32
  n_layers: 4
  vocab_size: 5
  weight_decay: 0.02
  epochs: 12
  ds_limit: 8000000
  batch_size: 256
  optimizer: 'AdamW'
  max_lr: 3e-4
  pct_start: 0.5
