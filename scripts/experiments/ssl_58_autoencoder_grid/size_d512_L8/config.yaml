experiment_type: 'ssl'
experiment_name: '58_autoencoder_grid_d512_L8'
run_message: >
  ssl_58 — d512_L8 in the masked-autoencoder grid. Scales the
  ssl_25/29/30 autoencoder lineage to ctx=512 with the modern ssl_57
  harness. SmrtAutoencoderSmallRF (r0=27, 4x downsample preserved).
  MaskedReconstructionLoss on kinetics channels at masked positions
  only.
  d=512, L=8, H=8, ctx=512, bs=128. Mirrors the ssl_55/56/57 grid
  d=512 axes.

resources:
  cores: 32
  memory: 256gb
  walltime: "48:00:00"
  gres: gpu:8
  num_processes: 8

ssl_dataset: 'yoran_raw.memmap'

probe_pos_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
probe_neg_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
probe_pos_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
probe_neg_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

ssl_pair_val_train: 'data/01_processed/val_sets/ssl_pair_val_yoran_v1.memmap'
ssl_pair_val_val:   'data/01_processed/val_sets/ssl_pair_val_ob007_v1.memmap'

resume_from: ''

smrt2vec:
  d_model: 512
  n_layers: 8
  n_head: 8
  context: 512
  p_mask: 0.15
  mask_size: 10
  total_steps: 1000000
  ds_limit: 0
  batch_size: 128
  optimizer: 'AdamW'
  max_lr: 3.0e-4
  weight_decay: 0.02
  pct_start: 0.03
  grad_clip: 5.0
  probe_every_steps: 10000
  checkpoint_every_steps: 10000
  resume_every_steps: 10000
  chunk_size: 2048

probe:
  context: 32
  batch_size: 512
  epochs: 3
  lr: 3.0e-3
  ds_limit: 500000
