experiment_type: 'supervised'
experiment_name: '15_legacy_reproduction'
run_message: 'reproduce the success with the legacy data in a static directory'

resources:
  cores: 16
  memory: 64gb
  walltime: 03:00:00
  gres: gpu:8
  num_processes: 8

legacy_train: data/01_processed/val_sets/pacbio_standard_train.parquet
legacy_val: data/01_processed/val_sets/pacbio_standard_test.parquet

classifier:
  d_model: 128
  n_head: 4
  context: 32
  n_layers: 4
  vocab_size: 5
  weight_decay: 0.02
  epochs: 12
  ds_limit: 2000000
  batch_size: 256
  optimizer: 'AdamW'
  max_lr: 3e-3
  pct_start: 0.5