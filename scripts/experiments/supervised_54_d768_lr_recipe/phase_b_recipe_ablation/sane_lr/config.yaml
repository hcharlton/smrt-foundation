experiment_type: 'supervised'
experiment_name: '54_d768_lr_recipe_phase_b_sane_lr'
run_message: >-
  Phase B1 of supervised_54_d768_lr_recipe. Both fixes applied: head_lr=3e-3
  / encoder_lr=3e-4 (supervised_27's ratio) crossed with bs=512 / 20 epochs
  (supervised_20 / supervised_27's recipe). If the LP->FT gap at d=768 is
  recipe-driven rather than representation-driven, this cell is where it
  reopens: ssl_58_best should lift cleanly over A2's frozen-encoder LP
  number, ideally by >=5pp at n=100k. If B1 still only reaches A0's ~0.747
  peak, the representation at d=768 is the true bottleneck and the report's
  conclusion shifts.
  Treatment is 'midlayer' with layer_idx=3, identical to A1 except for the
  recipe (bs and max_epochs). Two-group optimizer (head / encoder).
  1 arch x 2 inits x 3 train_sizes = 6 runs.

resources:
  cores: 32
  memory: 256gb
  walltime: "24:00:00"
  gres: gpu:8
  num_processes: 1

pos_data_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
neg_data_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
pos_data_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val2'
neg_data_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val2'

architectures:
  d768_L8: { d_model: 768, n_layers: 8, n_head: 12, layer_idx: 3 }

inits:
  random:
    checkpoint: null
  ssl_58_best:
    checkpoint: 'auto_best'
    ssl_exp_dirs:
      d768_L8: 'scripts/experiments/ssl_58_autoencoder_grid/size_d768_L8_long'

skip: []

train_sizes: [10000, 100000, 8000000]

classifier:
  context: 32
  weight_decay: 0.02
  pct_start: 0.1
  max_lr: 3e-3
  head_lr: 3e-3
  encoder_lr: 3e-4
  batch_size: 512
  cnn_variant: 'small_rf'
  treatment: 'midlayer'

scaling:
  val_limit: 1000000
  max_epochs: 20
  min_steps: 100
  max_steps: 400000
  n_evals: 40
  first_eval_step: 100
