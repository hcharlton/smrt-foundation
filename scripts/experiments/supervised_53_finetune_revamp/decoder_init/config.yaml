experiment_type: 'supervised'
experiment_name: '53_finetune_revamp_decoder_init'
run_message: >-
  F3: decoder-init warm-start fine-tune. DirectClassifierWithDecoder
  re-uses the SSL autoencoder's ConvTranspose1d upsample stack
  (SmrtDecoder.upsample) as a feature mixer between encoder and
  classifier head, instead of throwing the decoder away. The autoencoder's
  kinetics-prediction Linear is dropped (we want logits, not kinetics).
  Tests the "don't throw the projection head away" claim: if the SSL
  upsample weights carry useful structure, F3 should beat the plain
  encoder->head baseline; otherwise the upsample stack adds parameter
  count for no gain.
  Requires ssl_58 checkpoints saved with decoder_state_dict (Phase 0.2
  of the harness change). 5 archs x 2 inits x 3 train_sizes = 30 runs.
  All ssl_58 inits target the size_d*_L8_long continuations.

resources:
  cores: 32
  memory: 256gb
  walltime: "24:00:00"
  gres: gpu:8
  num_processes: 1

pos_data_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
neg_data_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
pos_data_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
neg_data_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

architectures:
  d128_L4:  { d_model: 128,  n_layers: 4, n_head: 2 }
  d256_L8:  { d_model: 256,  n_layers: 8, n_head: 4 }
  d512_L8:  { d_model: 512,  n_layers: 8, n_head: 8 }
  d768_L8:  { d_model: 768,  n_layers: 8, n_head: 12 }
  d1024_L8: { d_model: 1024, n_layers: 8, n_head: 16 }

inits:
  random:
    checkpoint: null
  ssl_58_best:
    checkpoint: 'auto_best'
    ssl_exp_dirs:
      d128_L4:  'scripts/experiments/ssl_58_autoencoder_grid/size_d128_L4_long'
      d256_L8:  'scripts/experiments/ssl_58_autoencoder_grid/size_d256_L8_long'
      d512_L8:  'scripts/experiments/ssl_58_autoencoder_grid/size_d512_L8_long'
      d768_L8:  'scripts/experiments/ssl_58_autoencoder_grid/size_d768_L8_long'
      d1024_L8: 'scripts/experiments/ssl_58_autoencoder_grid/size_d1024_L8_long'

skip: []

train_sizes: [10000, 100000, 8000000]

classifier:
  context: 32
  weight_decay: 0.02
  pct_start: 0.1
  max_lr: 3e-3
  batch_size: 4096
  cnn_variant: 'small_rf'
  treatment: 'decoder_init'

scaling:
  val_limit: 1000000
  max_epochs: 200
  min_steps: 100
  max_steps: 400000
  n_evals: 40
  first_eval_step: 100
