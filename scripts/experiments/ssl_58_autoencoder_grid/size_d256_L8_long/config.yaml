experiment_type: 'ssl'
experiment_name: '58_autoencoder_grid_d256_L8_long'
run_message: >
  ssl_58 long-runtime variant — d256_L8. Same architecture, dataset,
  and warmup+cosine curve as size_d256_L8 (schedule_steps=1_000_000,
  pct_start=0.03 → 30k warmup, 970k cosine), but the loop runs for
  96h instead of 48h with total_steps=10_000_000 so walltime is the
  binding exit. Once global_step passes 1M the LR clamps to
  min_lr_ratio*max_lr (1.5e-5) for the remaining tail.
  d=256, L=8, H=4, ctx=512, bs=256.

resources:
  cores: 32
  memory: 256gb
  walltime: "96:00:00"
  gres: gpu:8
  num_processes: 8

ssl_dataset: 'yoran_raw.memmap'

probe_pos_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
probe_neg_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
probe_pos_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
probe_neg_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

ssl_pair_val_train: 'data/01_processed/val_sets/ssl_pair_val_yoran_v1.memmap'
ssl_pair_val_val:   'data/01_processed/val_sets/ssl_pair_val_ob007_v1.memmap'

resume_from: ''

smrt2vec:
  d_model: 256
  n_layers: 8
  n_head: 4
  context: 512
  p_mask: 0.15
  mask_size: 10
  total_steps: 10000000
  schedule_steps: 1000000
  ds_limit: 0
  batch_size: 256
  optimizer: 'AdamW'
  max_lr: 3.0e-4
  weight_decay: 0.02
  pct_start: 0.03
  grad_clip: 5.0
  probe_every_steps: 10000
  checkpoint_every_steps: 10000
  resume_every_steps: 10000
  chunk_size: 2048

probe:
  context: 32
  batch_size: 512
  epochs: 3
  lr: 3.0e-3
  ds_limit: 500000
