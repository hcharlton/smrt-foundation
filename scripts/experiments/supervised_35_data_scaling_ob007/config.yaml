experiment_type: 'supervised'
experiment_name: '35_data_scaling_ob007'
run_message: >-
  Data scaling experiment with pretrained encoder (exp 29 ssl_29_large_pretrain,
  SmrtAutoencoder ctx=128 on 25G of OB007, 63% probe top-1).
  Two-stage fine-tuning: 100k steps frozen encoder (head-only at lr=3e-3),
  then 300k steps unfrozen with differential LR (encoder=3e-4, head=3e-3).
  Same grid as exp 33 for direct comparison of pretrained vs random init.

pretrained_checkpoint: 'scripts/experiments/ssl_29_large_pretrain/checkpoints/final_model.pt'

resources:
  cores: 32
  memory: 256gb
  walltime: 24:00:00
  gres: gpu:8
  num_processes: 1

pos_data_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
neg_data_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
pos_data_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
neg_data_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

scaling:
  train_sizes: [100, 500, 1000, 2000, 4000, 8000, 16000, 32000, 64000, 128000,
                256000, 512000, 1000000, 2000000, 4000000, 8000000]
  val_limit: 1000000
  steps_per_size: 400000
  n_evals: 20
  first_eval_step: 100

classifier:
  d_model: 128
  n_head: 4
  context: 32
  n_layers: 4
  weight_decay: 0.02
  batch_size: 512
  pct_start: 0.1

finetune:
  frozen_steps: 100000
  frozen_lr: 3e-3
  encoder_lr: 3e-4
  head_lr: 3e-3
