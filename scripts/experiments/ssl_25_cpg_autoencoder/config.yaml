experiment_type: 'ssl'
experiment_name: '25_cpg_autoencoder'
run_message: 'Autoencoder pretraining on CpG data (labels discarded). Eliminates distribution, length, and content mismatch between SSL training and probe evaluation. Diagnostic: if this works, the bottleneck was data regime, not architecture.'

resources:
  cores: 16
  memory: 256gb
  walltime: 2:00:00
  gres: gpu:8
  num_processes: 8

# SSL data source: CpG memmap shards (labels ignored, combined pos+neg)
ssl_pos_dir: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
ssl_neg_dir: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'

# Labeled data for linear probe evaluation
probe_pos_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
probe_neg_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
probe_pos_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
probe_neg_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

autoencoder:
  d_model: 128
  n_head: 4
  context: 32
  n_layers: 4
  vocab_size: 5
  weight_decay: 0.02
  p_mask: 0.15
  mask_size: 5
  epochs: 12
  ds_limit: 2000000
  batch_size: 1024
  optimizer: 'AdamW'
  max_lr: 3e-4
  pct_start: 0.25

probe:
  context: 32
  batch_size: 512
  epochs: 3
  lr: 3e-3
  ds_limit: 500000
