experiment_type: 'ssl'
experiment_name: '58_autoencoder_grid_d128_L4_ctx4096'
run_message: >
  ssl_58 — d128_L4 in the masked-autoencoder grid, ctx=4096 variant.
  Sibling to size_d128_L4 (ctx=512), pushing the autoencoder lineage to
  the native yoran read length so the attention horizon matches the
  ssl_57 input-mask grid. Same modern ssl_57 harness (no
  AcceleratedScheduler bug, ChunkedRandomSampler, step-based cadences,
  step-0 probe baseline, encoder-only portable milestones).
  SmrtAutoencoderSmallRF (r0=27, 4x downsample preserved).
  MaskedReconstructionLoss on kinetics channels at masked positions
  only — no contrastive pool, no projection head, no all-gather, no
  collapse pathway. Per-rank batch shrinks 8x vs the ctx=512 sibling
  (512 -> 64) to preserve activation-memory budget; matches ssl_57 v5
  d128 bs/rank exactly. Eval cadence halved (10000 -> 5000 steps) so
  trajectory resolution remains dense despite 8x fewer samples-seen
  per step.
  d=128, L=4, H=2, ctx=4096, bs=64.

resources:
  cores: 32
  memory: 256gb
  walltime: "48:00:00"
  gres: gpu:8
  num_processes: 8

ssl_dataset: 'yoran_raw.memmap'

probe_pos_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
probe_neg_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
probe_pos_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
probe_neg_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

ssl_pair_val_train: 'data/01_processed/val_sets/ssl_pair_val_yoran_v1.memmap'
ssl_pair_val_val:   'data/01_processed/val_sets/ssl_pair_val_ob007_v1.memmap'

resume_from: ''

smrt2vec:
  d_model: 128
  n_layers: 4
  n_head: 2
  context: 4096
  p_mask: 0.15
  mask_size: 10
  total_steps: 1000000
  ds_limit: 0
  batch_size: 64
  optimizer: 'AdamW'
  max_lr: 3.0e-4
  weight_decay: 0.02
  pct_start: 0.03
  grad_clip: 5.0
  probe_every_steps: 5000
  checkpoint_every_steps: 5000
  resume_every_steps: 5000
  chunk_size: 2048

probe:
  context: 32
  batch_size: 512
  epochs: 3
  lr: 3.0e-3
  ds_limit: 500000
