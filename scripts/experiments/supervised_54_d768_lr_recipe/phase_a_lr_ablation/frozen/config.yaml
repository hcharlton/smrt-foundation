experiment_type: 'supervised'
experiment_name: '54_d768_lr_recipe_phase_a_frozen'
run_message: >-
  Phase A2 of supervised_54_d768_lr_recipe. In-harness linear probe:
  encoder permanently frozen, optimizer touches only the head parameters.
  Acts as the anchor for the 0.71 SSL probe number that the report
  compares the fine-tune cells against. Treatment is 'linear_probe',
  which dispatches to DirectClassifierSmallRF (top-layer readout, same
  shape as the SSL probe in probe_history.csv -- this is deliberate, so
  the A2 number is the SSL probe reproduced inside the FT codepath rather
  than a layer-modified variant of it). encoder_lr is unused under
  linear_probe and is logged as 0.0 in the per-combo CSV.
  1 arch x 2 inits x 3 train_sizes = 6 runs.
  Note: the random-init A2 cell is chance-level by construction (no
  encoder training, head-only LP on top of random features); reported
  for symmetry with the other cells and as a sanity check on the head
  capacity.

resources:
  cores: 32
  memory: 256gb
  walltime: "24:00:00"
  gres: gpu:8
  num_processes: 1

pos_data_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
neg_data_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
pos_data_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val2'
neg_data_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val2'

architectures:
  d768_L8: { d_model: 768, n_layers: 8, n_head: 12 }

inits:
  random:
    checkpoint: null
  ssl_58_best:
    checkpoint: 'auto_best'
    ssl_exp_dirs:
      d768_L8: 'scripts/experiments/ssl_58_autoencoder_grid/size_d768_L8_long'

skip: []

train_sizes: [10000, 100000, 8000000]

classifier:
  context: 32
  weight_decay: 0.02
  pct_start: 0.1
  max_lr: 3e-3
  head_lr: 3e-3
  encoder_lr: null
  batch_size: 4096
  cnn_variant: 'small_rf'
  treatment: 'linear_probe'

scaling:
  val_limit: 1000000
  max_epochs: 200
  min_steps: 100
  max_steps: 400000
  n_evals: 40
  first_eval_step: 100
