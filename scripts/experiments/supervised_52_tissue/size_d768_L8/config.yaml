experiment_type: 'supervised'
experiment_name: 'tissue_size_grid_d768_L8'
run_message: >
  Tissue 8-way classifier shakedown: 50k train (cell s1), 10k val_s1
  (held-out reads from cell s1), 10k val_s2 (held-out cell s2). 4h
  walltime budget per size. d=768, L=8, head_dim=64.

resources:
  cores: 16
  memory: 256gb
  walltime: "04:30:00"
  gres: gpu:8
  num_processes: 8

data_dir: 'data/01_processed/tissue_sets/yoran_ctx4096'
partition_path: 'data/01_processed/tissue_sets/yoran_ctx4096/partition.csv'

classifier:
  d_model: 768
  n_layers: 8
  n_head: 12         # head_dim = 64
  context: 2048
  n_continuous: 4
  n_classes: 8

  total_steps: 25000
  eval_every_steps: 200
  resume_every_steps: 5000

  batch_size: 32     # per GPU; global = 256 across 8 ranks
  max_lr: 3e-3
  weight_decay: 0.02
  pct_start: 0.1
  grad_clip: 5.0

  dataset_on_gpu: true
  chunk_size: 2048
  ds_limit: 0
  save_checkpoints: false
