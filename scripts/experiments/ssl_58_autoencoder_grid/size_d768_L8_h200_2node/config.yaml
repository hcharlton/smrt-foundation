experiment_type: 'ssl'
experiment_name: '58_autoencoder_grid_d768_L8_h200_2node'
run_message: >
  ssl_58 — 2-node H200 variant of size_d768_L8_h200, intended as a
  multi-node infrastructure test for the GenomeDK sysadmins. Same model
  and data as the single-node h200 sibling; only the launch topology
  changes (1 node x 4 GPUs -> 2 nodes x 4 GPUs = 8 GPUs total). Walltime
  capped at 02:00:00 because this run is expected to be canceled or to
  expire before producing scientifically useful checkpoints; the goal is
  to exercise multi-node DDP rendezvous, NCCL over the inter-node fabric,
  and Accelerate's --num_machines path on h200 hardware. Submitted via
  the directory-local `submit.sh` rather than `run.sh`, which only
  supports single-node sbatch wraps.

  Hyperparameters identical to size_d768_L8_h200: per-process bs=512,
  ctx=512, p_mask=0.15, mask_size=10, max_lr=3e-4, total_steps=1M.
  Global batch doubles to 4096 (8 ranks x 512) because num_processes
  doubles, but this is incidental — the run isn't expected to finish.

resources:
  cores: 32
  memory: 256gb
  walltime: "02:00:00"
  partition: gpu-h200
  nodes: 2
  num_processes: 8

ssl_dataset: 'yoran_raw.memmap'

probe_pos_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
probe_neg_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
probe_pos_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
probe_neg_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

ssl_pair_val_train: 'data/01_processed/val_sets/ssl_pair_val_yoran_v1.memmap'
ssl_pair_val_val:   'data/01_processed/val_sets/ssl_pair_val_ob007_v1.memmap'

resume_from: ''

smrt2vec:
  d_model: 768
  n_layers: 8
  n_head: 12
  context: 512
  p_mask: 0.15
  mask_size: 10
  total_steps: 1000000
  ds_limit: 0
  batch_size: 512
  optimizer: 'AdamW'
  max_lr: 3.0e-4
  weight_decay: 0.02
  pct_start: 0.03
  grad_clip: 5.0
  probe_every_steps: 10000
  checkpoint_every_steps: 10000
  resume_every_steps: 10000
  chunk_size: 2048

probe:
  context: 32
  batch_size: 512
  epochs: 3
  lr: 3.0e-3
  ds_limit: 500000
