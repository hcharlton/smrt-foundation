experiment_type: 'supervised'
experiment_name: '53_finetune_revamp_midlayer'
run_message: >-
  F1: middle-layer fine-tune. DirectClassifierMidLayer reads the
  classification representation at a configurable layer_idx instead of
  always at the encoder's final transformer layer. Tests the hypothesis
  that ssl_58's small LP->FT gap at scale (d=512/d=768) reflects the top
  layer being reconstruction-specialised by the autoencoder loss, with
  classification-relevant features sitting deeper in the stack.
  Per-arch layer_idx is set from an offline layer-sweep probe
  (scripts/utils/midlayer_probe_sweep.py) on the best-probe ssl_58
  checkpoint. Defaults below are mid-stack pre-sweep; UPDATE before submit
  once midlayer_probe_results.csv is available.
  5 archs x 2 inits x 3 train_sizes = 30 runs.
  All ssl_58 inits target the size_d*_L8_long continuations so
  fine-tune reads from the longer-trained representations.

resources:
  cores: 32
  memory: 256gb
  walltime: "24:00:00"
  gres: gpu:8
  num_processes: 1

pos_data_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
neg_data_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
pos_data_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
neg_data_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

# Per-arch layer_idx: midpoint default (n_layers // 2 - 1, 0-indexed) until the
# layer-sweep probe pins down the empirical best. Sweep at d=128_L4 over
# layers 0..3, at d=256/512/768/1024_L8 over layers 0..7.
architectures:
  d128_L4: { d_model: 128, n_layers: 4, n_head: 2, layer_idx: 1 }
  d256_L8: { d_model: 256, n_layers: 8, n_head: 4, layer_idx: 3 }
  d512_L8: { d_model: 512, n_layers: 8, n_head: 8, layer_idx: 3 }
  d768_L8: { d_model: 768, n_layers: 8, n_head: 12, layer_idx: 3 }
  d1024_L8: { d_model: 1024, n_layers: 8, n_head: 16, layer_idx: 3 }

inits:
  random:
    checkpoint: null
  ssl_58_best:
    checkpoint: 'auto_best'
    ssl_exp_dirs:
      d128_L4:  'scripts/experiments/ssl_58_autoencoder_grid/size_d128_L4_long'
      d256_L8:  'scripts/experiments/ssl_58_autoencoder_grid/size_d256_L8_long'
      d512_L8:  'scripts/experiments/ssl_58_autoencoder_grid/size_d512_L8_long'
      d768_L8:  'scripts/experiments/ssl_58_autoencoder_grid/size_d768_L8_long'
      d1024_L8: 'scripts/experiments/ssl_58_autoencoder_grid/size_d1024_L8_long'

skip: []

train_sizes: [10000, 100000, 8000000]

classifier:
  context: 32
  weight_decay: 0.02
  pct_start: 0.1
  max_lr: 3e-3
  batch_size: 4096
  cnn_variant: 'small_rf'
  treatment: 'midlayer'

scaling:
  val_limit: 1000000
  max_epochs: 200
  min_steps: 100
  max_steps: 400000
  n_evals: 40
  first_eval_step: 100
