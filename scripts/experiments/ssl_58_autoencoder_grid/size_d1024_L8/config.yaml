experiment_type: 'ssl'
experiment_name: '58_autoencoder_grid_d1024_L8'
run_message: >
  ssl_58 — d1024_L8 in the masked-autoencoder grid. Extends the size axis
  one tier wider than the previous d=768 max. Same modern ssl_57 harness,
  same SmrtAutoencoderSmallRF (r0=27, 4x downsample preserved),
  MaskedReconstructionLoss on kinetics channels at masked positions only.
  Per-rank batch shrinks 2x vs d=768 (64 -> 32) to preserve activation-
  memory budget at the wider model. head_dim=64 preserved (n_head=16),
  matching grid convention. Walltime extended to 120h since d=1024
  throughput is ~1.78x slower per step than d=768; will land mid-cosine
  at ~210k steps, same pattern as the existing d=768 run.
  d=1024, L=8, H=16, ctx=512, bs=32.

resources:
  cores: 32
  memory: 256gb
  walltime: "120:00:00"
  gres: gpu:8
  num_processes: 8

ssl_dataset: 'yoran_raw.memmap'

probe_pos_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
probe_neg_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
probe_pos_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
probe_neg_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

ssl_pair_val_train: 'data/01_processed/val_sets/ssl_pair_val_yoran_v1.memmap'
ssl_pair_val_val:   'data/01_processed/val_sets/ssl_pair_val_ob007_v1.memmap'

resume_from: ''

smrt2vec:
  d_model: 1024
  n_layers: 8
  n_head: 16
  context: 512
  p_mask: 0.15
  mask_size: 10
  total_steps: 1000000
  ds_limit: 0
  batch_size: 32
  optimizer: 'AdamW'
  max_lr: 3.0e-4
  weight_decay: 0.02
  pct_start: 0.03
  grad_clip: 5.0
  probe_every_steps: 10000
  checkpoint_every_steps: 10000
  resume_every_steps: 10000
  chunk_size: 2048

probe:
  context: 32
  batch_size: 512
  epochs: 3
  lr: 3.0e-3
  ds_limit: 500000
