experiment_type: 'ssl'
experiment_name: '29_large_pretrain'
run_message: 'Large-scale autoencoder pretraining on full SSL dataset with random cropping. Tests the SSL value proposition: more unlabeled data than labeled data. ~100 GPU hours budget.'

resources:
  cores: 64
  memory: 256gb
  walltime: 24:00:00
  gres: gpu:8
  num_processes: 8

ssl_dataset: 'ob007_raw_small.memmap'

# Labeled data for periodic probe evaluation
probe_pos_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
probe_neg_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
probe_pos_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
probe_neg_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

autoencoder:
  d_model: 128
  n_head: 4
  context: 128
  n_layers: 4
  vocab_size: 5
  weight_decay: 0.02
  p_mask: 0.15
  mask_size: 10
  epochs: 100
  ds_limit: 0
  batch_size: 512
  optimizer: 'AdamW'
  max_lr: 3e-4
  pct_start: 0.01
  checkpoint_every: 20
  probe_every: 20
  crops_per_read: 32

probe:
  context: 32
  batch_size: 512
  epochs: 3
  lr: 3e-3
  ds_limit: 500000
