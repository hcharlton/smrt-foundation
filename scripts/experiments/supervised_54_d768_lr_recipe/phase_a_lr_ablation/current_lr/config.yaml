experiment_type: 'supervised'
experiment_name: '54_d768_lr_recipe_phase_a_current_lr'
run_message: >-
  Phase A0 of supervised_54_d768_lr_recipe (control cell). Reproduces the
  existing supervised_53/midlayer trajectory on the d768_L8_long artifact:
  uniform encoder LR (3e-3) under the current high-bs / 200-epoch recipe.
  head_lr == encoder_lr == max_lr triggers the single-group optimizer
  fallback in _build_optimizer, exactly matching supervised_53's optimizer
  state shape. Treatment is 'midlayer' with layer_idx=3 (mid-stack on the
  L=8 encoder), matching supervised_53/midlayer's per-arch default for
  d768_L8 so trajectories are directly comparable.
  1 arch x 2 inits x 3 train_sizes = 6 runs.

resources:
  cores: 32
  memory: 256gb
  walltime: "24:00:00"
  gres: gpu:8
  num_processes: 1

pos_data_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
neg_data_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
pos_data_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val2'
neg_data_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val2'

architectures:
  d768_L8: { d_model: 768, n_layers: 8, n_head: 12, layer_idx: 3 }

inits:
  random:
    checkpoint: null
  ssl_58_best:
    checkpoint: 'auto_best'
    ssl_exp_dirs:
      d768_L8: 'scripts/experiments/ssl_58_autoencoder_grid/size_d768_L8_long'

skip: []

train_sizes: [10000, 100000, 8000000]

classifier:
  context: 32
  weight_decay: 0.02
  pct_start: 0.1
  max_lr: 3e-3
  head_lr: 3e-3
  encoder_lr: 3e-3
  batch_size: 4096
  cnn_variant: 'small_rf'
  treatment: 'midlayer'

scaling:
  val_limit: 1000000
  max_epochs: 200
  min_steps: 100
  max_steps: 400000
  n_evals: 40
  first_eval_step: 100
