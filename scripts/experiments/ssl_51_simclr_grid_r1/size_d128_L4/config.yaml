experiment_type: 'ssl'
experiment_name: '51_simclr_grid_r1_d128_L4'
run_message: >
  R1 grid — smallest size (~0.5M params). Anchor that matches current
  SSL experiments' architectural scale. Pass criterion: probe_top1 >= 0.63
  AND non-decreasing over last 3 evals.

resources:
  cores: 64
  memory: 256gb
  walltime: 6:00:00        # ~2.5 h training + overhead
  gres: gpu:8
  num_processes: 8

ssl_dataset: 'ob007_raw.memmap'

probe_pos_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
probe_neg_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
probe_pos_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
probe_neg_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

data_config: 'configs/data.yaml'

# Resume target (empty = fresh run). Point at a prior run's
# `checkpoints/latest/` Accelerate state dir to resume.
resume_from: ''

simclr:
  d_model: 128
  n_head: 2
  n_layers: 4
  context: 32
  projection_dim: 128
  projection_layers: 2
  temperature: 0.1
  epochs: 100
  ds_limit: 0
  batch_size: 512
  optimizer: 'AdamW'
  max_lr: 3.0e-4
  weight_decay: 1.0e-4
  pct_start: 0.05
  checkpoint_every: 25       # portable epoch_N.pt milestones
  resume_every: 25           # ~0.2 h/epoch × 25 = ~5 h max wall loss
  probe_every: 5

augment:
  revcomp_p: 0.0
  channel_dropout_p: 0.2
  gaussian_noise_p: 0.8
  gaussian_noise_sigma: 0.1
  blur_p: 0.5
  blur_sigma_range: [0.2, 2.0]

probe:
  context: 32
  batch_size: 512
  epochs: 3
  lr: 3.0e-3
  ds_limit: 500000
