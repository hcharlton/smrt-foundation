experiment_type: 'ssl'
experiment_name: '21_normalized_pretrain'
run_message: 'SSL pretraining with ZNorm log1p normalization (matching supervised), higher masking ratio, linear probe eval after each epoch, model checkpointing.'

resources:
  cores: 16
  memory: 256gb
  walltime: 24:00:00
  gres: gpu:8
  num_processes: 8

ssl_dataset: 'ob007_raw.memmap'

# Labeled data for linear probe evaluation
probe_pos_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
probe_neg_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
probe_pos_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
probe_neg_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

smrt2vec:
  d_model: 128
  n_head: 4
  context: 4096
  n_layers: 4
  vocab_size: 5
  weight_decay: 0.02
  p_mask: 0.15
  mask_size: 10
  epochs: 12
  ds_limit: 2000000
  batch_size: 64
  optimizer: 'AdamW'
  max_lr: 3e-4
  temperature: 0.1
  pct_start: 0.25

probe:
  context: 32
  batch_size: 512
  epochs: 3
  lr: 3e-3
  ds_limit: 500000
