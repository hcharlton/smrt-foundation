experiment_type: 'supervised'
experiment_name: '41_baseline_epoch_cap'
run_message: >-
  Rerun of exp 33/39 with epoch-capped step budget. Instead of fixed 400k steps
  for all sizes, each size trains for min(max(max_epochs * steps_per_epoch,
  min_steps), max_steps). This prevents catastrophic overtraining at small sizes
  (exp 33 trained n=100 for 400k epochs) while keeping large sizes unchanged.
  LR schedule scales proportionally per size.

resources:
  cores: 32
  memory: 256gb
  walltime: 12:00:00
  gres: gpu:8
  num_processes: 1

pos_data_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
neg_data_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
pos_data_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
neg_data_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

scaling:
  train_sizes: [100, 500, 1000, 2000, 4000, 8000, 16000, 32000, 64000, 128000,
                256000, 512000, 1000000, 2000000, 4000000, 8000000]
  val_limit: 1000000
  max_epochs: 200
  min_steps: 10000
  max_steps: 400000
  n_evals: 40
  first_eval_step: 100

classifier:
  d_model: 128
  n_head: 4
  context: 32
  n_layers: 4
  weight_decay: 0.02
  batch_size: 4096
  max_lr: 3e-3
  pct_start: 0.1
