experiment_type: 'supervised'
experiment_name: '54_d768_lr_recipe_phase_a_sane_lr'
run_message: >-
  Phase A1 of supervised_54_d768_lr_recipe. Tests the encoder-LR hypothesis
  in isolation from the recipe (batch / epoch) hypothesis: head_lr=3e-3 +
  encoder_lr=3e-4 (10x lower, matching supervised_27's stage-2 ratio that
  produced the only clean +13pp LP->FT lift in this project) under the
  same high-bs / 200-epoch recipe as supervised_53. Two-group optimizer:
  head (3e-3) and encoder (3e-4) share a single cosine schedule; both
  groups decay by the same factor per step (per-group initial_lr).
  Treatment is 'midlayer' with layer_idx=3, identical to Phase A0 except
  for the encoder LR. 1 arch x 2 inits x 3 train_sizes = 6 runs.

resources:
  cores: 32
  memory: 256gb
  walltime: "24:00:00"
  gres: gpu:8
  num_processes: 1

pos_data_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
neg_data_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
pos_data_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val2'
neg_data_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val2'

architectures:
  d768_L8: { d_model: 768, n_layers: 8, n_head: 12, layer_idx: 3 }

inits:
  random:
    checkpoint: null
  ssl_58_best:
    checkpoint: 'auto_best'
    ssl_exp_dirs:
      d768_L8: 'scripts/experiments/ssl_58_autoencoder_grid/size_d768_L8_long'

skip: []

train_sizes: [10000, 100000, 8000000]

classifier:
  context: 32
  weight_decay: 0.02
  pct_start: 0.1
  max_lr: 3e-3
  head_lr: 3e-3
  encoder_lr: 3e-4
  batch_size: 4096
  cnn_variant: 'small_rf'
  treatment: 'midlayer'

scaling:
  val_limit: 1000000
  max_epochs: 200
  min_steps: 100
  max_steps: 400000
  n_evals: 40
  first_eval_step: 100
