experiment_type: 'ssl'
experiment_name: '26_cpg_contrastive'
run_message: 'Contrastive pretraining (InputMask + InfoNCE) on CpG data (labels discarded). Head-to-head comparison with exp 25 (autoencoder on same data). Tests whether contrastive objective works when distribution mismatch is eliminated.'

resources:
  cores: 16
  memory: 256gb
  walltime: 2:00:00
  gres: gpu:8
  num_processes: 8

# SSL data source: CpG memmap shards (labels ignored, combined pos+neg)
ssl_pos_dir: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
ssl_neg_dir: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'

# Labeled data for linear probe evaluation
probe_pos_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
probe_neg_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
probe_pos_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
probe_neg_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

smrt2vec:
  d_model: 128
  n_head: 4
  context: 32
  n_layers: 4
  vocab_size: 5
  weight_decay: 0.02
  p_mask: 0.15
  mask_size: 5
  epochs: 12
  ds_limit: 0
  batch_size: 1024
  optimizer: 'AdamW'
  max_lr: 3e-4
  temperature: 0.1
  max_negatives: 256
  pct_start: 0.25

probe:
  context: 32
  batch_size: 512
  epochs: 3
  lr: 3e-3
  ds_limit: 500000
