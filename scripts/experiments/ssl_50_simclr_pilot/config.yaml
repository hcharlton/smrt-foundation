experiment_type: 'ssl'
experiment_name: '50_simclr_pilot'
run_message: >
  SimCLR v1 pilot. Pretrain on full-read OB007 subcropped to ctx=32,
  validate the augmentation policy preserves methylation signal (linear
  probe on CpG pos/neg). Pass criterion: probe_top1 >= 0.63 and
  non-decreasing over the last 3 evals. If this passes, ssl_51_simclr_grid_r1
  runs the same policy across four model sizes.

resources:
  cores: 64
  memory: 256gb
  walltime: 12:00:00
  gres: gpu:8
  num_processes: 8

# Full-read SSL source (same memmap as exp 29). Each row is [T=4096, 4]
# with kinetics for a single strand (fi/fp for fwd rows, ri/rp for rev
# rows). SimCLR subcrops to `context` below; both views are drawn from
# the same row so they are positives by construction.
ssl_dataset: 'ob007_raw_small.memmap'

# Labeled CpG data for per-epoch linear probe evaluation. Matches exps
# 25/26/29 so probe_top1 is directly comparable.
probe_pos_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
probe_neg_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
probe_pos_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
probe_neg_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

# Path to the data config used by normalization / RC lookups.
data_config: 'configs/data.yaml'

# Explicit resume target. Empty (or absent) = fresh run. To resume a
# crashed run, set to the absolute or project-relative path of that run's
# `checkpoints/latest/` Accelerate state directory. The training loop
# validates simclr.{d_model,n_layers,n_head,context,projection_*} match
# the stored sidecar before loading; mismatches abort.
resume_from: ''

simclr:
  d_model: 128
  n_head: 4
  n_layers: 4
  context: 32
  projection_dim: 128
  projection_layers: 2
  temperature: 0.1
  # Training
  epochs: 100
  ds_limit: 200000
  batch_size: 512       # per-rank; global = 512 * num_processes = 4096
  optimizer: 'AdamW'
  max_lr: 3e-4
  weight_decay: 1.0e-4
  pct_start: 0.05
  checkpoint_every: 20       # portable epoch_N.pt for downstream consumers
  resume_every: 20           # overwrite checkpoints/latest/ for crash recovery
  probe_every: 5

augment:
  # Always applied: subcrop to `context` (set via simclr.context above).
  # Stochastic: per-primitive Bernoulli gates. Matches SimCLR §A defaults
  # adapted to the kinetics domain.
  revcomp_p: 0.0        # OFF — strand-asymmetric kinetics (see augment.py)
  channel_dropout_p: 0.2
  gaussian_noise_p: 0.8
  gaussian_noise_sigma: 0.1
  blur_p: 0.5
  blur_sigma_range: [0.2, 2.0]

probe:
  context: 32
  batch_size: 512
  epochs: 3
  lr: 3.0e-3
  ds_limit: 500000
