experiment_type: 'ssl'
experiment_name: '59_mae_d512_L8'
run_message: >
  ssl_59 — true MAE sparse encoder at d=512, L=8, ctx=512.
  SmrtAutoencoderMAE: encoder transformer sees only the kept (~25%) post-CNN
  latents; a small decoder transformer (2 layers) plus the existing
  ConvTranspose1d upsample stack fill in masked latents and reconstruct
  kinetics. Mask is applied AFTER the CNN to preserve stride-2 conv
  locality. He et al. 2022's asymmetric encoder/decoder lifted onto our
  CNN-transformer hybrid.
  vs ssl_58 (BERT-style in-place input masking on SmrtAutoencoderSmallRF):
    - ssl_58 zeros kinetics at random spans pre-CNN; encoder still sees the
      full sequence with zeros where kinetics were masked.
    - ssl_59 drops 75% of post-CNN latents from the encoder entirely;
      decoder reconstructs from a [mask] token at dropped positions.
  Per-rank batch is bumped to 192 (vs ssl_58 d=512's bs=128) since the
  encoder transformer only processes 25% of latents.
  d=512, L=8, H=8, ctx=512, mask_ratio=0.75, bs=192.

resources:
  cores: 32
  memory: 256gb
  walltime: "120:00:00"
  gres: gpu:8
  num_processes: 8

ssl_dataset: 'yoran_raw.memmap'

probe_pos_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
probe_neg_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
probe_pos_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
probe_neg_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

ssl_pair_val_train: 'data/01_processed/val_sets/ssl_pair_val_yoran_v1.memmap'
ssl_pair_val_val:   'data/01_processed/val_sets/ssl_pair_val_ob007_v1.memmap'

resume_from: ''

smrt2vec:
  d_model: 512
  n_layers: 8
  n_head: 8
  context: 512
  mask_ratio: 0.75
  decoder_n_layers: 2
  total_steps: 1000000
  ds_limit: 0
  batch_size: 192
  optimizer: 'AdamW'
  max_lr: 3.0e-4
  weight_decay: 0.02
  pct_start: 0.03
  grad_clip: 5.0
  probe_every_steps: 10000
  checkpoint_every_steps: 10000
  resume_every_steps: 10000
  chunk_size: 2048

probe:
  context: 32
  batch_size: 512
  epochs: 3
  lr: 3.0e-3
  ds_limit: 500000
