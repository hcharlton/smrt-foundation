experiment_type: 'supervised'
experiment_name: '32_no_transformer'
run_message: 'Transformer ablation of exp 31: DirectClassifierNoTransformer (SmrtEmbedding + default CNN + classification head, no PositionalEncoding and no TransformerBlocks). One-variable change from exp 31 — same data, KineticsNorm, optimizer, schedule, metrics, per-epoch checkpointing. Quantifies how much of exp 31''s ~82% top-1 depends on the transformer blocks at ctx=32, where the CNN receptive field (107) already covers the full input.'

resources:
  cores: 16
  memory: 256gb
  walltime: 20:00:00
  gres: gpu:8
  num_processes: 8

pos_data_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
neg_data_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
pos_data_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
neg_data_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

classifier:
  d_model: 128
  context: 32
  weight_decay: 0.02
  epochs: 20
  ds_limit: 0
  batch_size: 512
  max_lr: 3e-3
  pct_start: 0.1
