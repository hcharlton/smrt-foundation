experiment_type: 'supervised'
experiment_name: '46_ob007_matched_scaled_bs'
run_message: >-
  Exp 42's single-stage schedule (AdamW lr=3e-3 all params) with
  exp 44's per-size batch sizing layered on top. Tests whether
  bs-scaling alone recovers small-n behaviour without the
  gradual-unfreeze schedule that regressed exp 43/44/45 at large n.

pretrained_checkpoint: 'scripts/experiments/ssl_29_large_pretrain/checkpoints/final_model.pt'

resources:
  cores: 32
  memory: 256gb
  walltime: 04:00:00
  gres: gpu:8
  num_processes: 1

pos_data_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
neg_data_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
pos_data_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
neg_data_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

scaling:
  train_sizes: [100, 500, 1000, 2000, 4000, 8000, 16000, 32000, 64000, 128000,
                256000, 512000, 1000000, 2000000, 4000000, 8000000]
  val_limit: 1000000
  max_epochs: 200
  min_steps: 10000
  max_steps: 400000
  n_evals: 40
  first_eval_step: 100

classifier:
  d_model: 128
  n_head: 4
  context: 32
  n_layers: 4
  weight_decay: 0.02
  batch_size: 4096     # bs_cap
  bs_floor: 64
  bs_k: 8
  max_lr: 3e-3
  pct_start: 0.1
