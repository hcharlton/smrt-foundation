experiment_type: 'supervised'
experiment_name: '28_baseline_control'
run_message: 'Controlled baseline: exp 20 from scratch with ds_limit=20M to match exp 27 data budget. Disambiguates whether the 3pp gap (79% vs 82%) is from the fine-tuning schedule or from pretraining hurting.'

resources:
  cores: 16
  memory: 256gb
  walltime: 6:00:00
  gres: gpu:8
  num_processes: 8

pos_data_train: 'data/01_processed/val_sets/cpg_pos_v2.memmap/train'
neg_data_train: 'data/01_processed/val_sets/cpg_neg_v2.memmap/train'
pos_data_val: 'data/01_processed/val_sets/cpg_pos_v2.memmap/val'
neg_data_val: 'data/01_processed/val_sets/cpg_neg_v2.memmap/val'

classifier:
  d_model: 128
  n_head: 4
  context: 32
  n_layers: 4
  vocab_size: 5
  weight_decay: 0.02
  epochs: 20
  ds_limit: 20000000
  batch_size: 512
  optimizer: 'AdamW'
  max_lr: 3e-3
  pct_start: 0.1
